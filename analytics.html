<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Analytics · Attend-It</title>
<link rel="stylesheet" href="css/analytics.css"/>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div id="loader" class="loader hidden"><div class="loader-ring"></div></div>
  <div id="toast" class="toast"></div>
  <div class="app">
    <aside class="sidebar glass" id="sidebar">
      <div class="brand"><div class="logo-sm">A</div><span>Attend-It</span></div>
      <nav class="nav">
        <a href="dashboard.html" class="nav-item">Dashboard</a>
        <a href="attendance.html" class="nav-item">Attendance</a>
        <a href="analytics.html" class="nav-item active">Analytics</a>
        <a href="profile.html" class="nav-item">Profile</a>
        <a href="settings.html" class="nav-item">Settings</a>
      </nav>
      <div class="sidebar-foot"><button class="btn btn-ghost ripple" id="logoutBtn">Logout</button></div>
    </aside>
    <div class="main">
      <header class="topbar glass">
        <button class="icon-btn" id="menuBtn">≡</button>
        <h2 class="page-title">Analytics & Insights</h2>
        <div class="top-right"><a href="profile.html" class="avatar-link">
  <div class="avatar" id="topAvatar">JD</div>
</a></div>
      </header>
      <section class="content">
        <div class="kpis">
          <div class="card glass kpi"><p>Attendance Score</p><h2 data-counter id="kScore">0</h2><span class="muted">/ 100</span></div>
          <div class="card glass kpi"><p>Avg WFO</p><h2 data-counter id="kOff">0</h2><span class="muted">days / mo</span></div>
          <div class="card glass kpi"><p>Avg WFH</p><h2 data-counter id="kWfh">0</h2><span class="muted">days / mo</span></div>
          <div class="card glass kpi"><p>Leaves </p><h2 data-counter id="kLeave">0</h2><span class="muted">total</span></div>
        </div>
        <div class="grid">
          <div class="card glass span-3">
            <div class="card-head"><h3>Monthly Attendance</h3><span class="muted">last 6 months</span></div>
            <canvas id="chartMonthly" height="240"></canvas>
          </div>
          <div class="card glass">
            <div class="card-head"><h3>Office vs WFH</h3></div>
            <canvas id="chartDonut" height="320"></canvas>
          </div>  
            <div class="card glass">
    <div class="card-head">
        <h3>Monthly Summary</h3>
    </div>

    <div class="summary">

        <div>
            <span>Working Days</span>
            <b id="sumWorking">0</b>
        </div>

        <div>
            <span>WFO</span>
            <b id="sumOffice">0</b>
        </div>

        <div>
            <span>WFH</span>
            <b id="sumWFH">0</b>
        </div>

        <div>
            <span>Leaves</span>
            <b id="sumLeave">0</b>
        </div>

    </div>
</div>
        </div>
      </section>
    </div>
  </div>
  <script src="js/analytics.js"></script>
</body>
</html>
